name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild -project NotchMate.xcodeproj -scheme NotchMate \
            -configuration Debug build \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_ALLOWED=NO
      - name: Test
        run: |
          xcodebuild test -project NotchMate.xcodeproj -scheme NotchMate \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_ALLOWED=NO
